server:
  port: 8080
spring:
  application:
    name: cloudfarming-aggregation
  profiles:
    active: local
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:aggregation-shardingsphere-config.yaml
    hikari:
      minimum-idle: 1
      maximum-pool-size: 10
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 540000
      keepalive-time: 120000
      connection-test-query: SELECT 1
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 10s
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8090
  rabbitmq:
    host: localhost
    port: 5672
    username: your username
    password: your password
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan:
        - com.vv.cloudfarming.user.controller
        - com.vv.cloudfarming.order.controller
        - com.vv.cloudfarming.product.controller
knife4j:
  enable: true
  setting:
    language: zh_cn
sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: false
  is-share: false
  token-style: uuid
  is-log: false
logging:
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS

aggregation:
  remote-url: http://127.0.0.1:${server.port}
