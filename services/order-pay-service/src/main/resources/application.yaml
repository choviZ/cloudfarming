server:
  port: 8083

spring:
  profiles:
    active: local
  application:
    name: cloudfarming-order-pay
  datasource:
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    url: jdbc:shardingsphere:classpath:shardingsphere-config.yaml
    hikari:
      minimum-idle: 1
      maximum-pool-size: 10
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 540000
      keepalive-time: 120000
      connection-test-query: SELECT 1
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 10s
      lettuce:
        pool:
          max-active: 200
          max-wait: -1ms
          max-idle: 10
          min-idle: 0
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.vv.cloudfarming.order.controller

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
sa-token:
  token-name: satoken
  timeout: 2592000
  active-timeout: -1
  is-concurrent: false
  is-share: false
  token-style: uuid
  is-log: false
logging:
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
agreement:
  adopt:
    version: v1.0.0
    title: 云农场认养异常处置协议
    content: |
      1. 认养项目受养殖周期、自然灾害、疫病防控等客观因素影响，平台与农户将根据实际情况启动异常处置流程。
      2. 如发生牲畜死亡、重大疾病或其他无法继续履约的情况，平台将优先安排同等价值的替换认养方案；无法替换时，按协议约定退款或折算补偿。
      3. 异常处置结果以平台公告、站内消息或订单通知为准，用户应配合完成后续确认流程。
      4. 用户下单即确认已充分知悉认养风险及处置方式，不得以未阅读协议为由拒绝平台已公示的处理方案。
